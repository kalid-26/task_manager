<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Task Manager{% endblock %}</title>

    <link rel="stylesheet" href="{% static 'css/bootstrap.css' %}">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="{% static 'icons/remixicon.css' %}">

</head>
<body>
    
    <div class="">
        {% if user.is_authenticated %}
            <div class="container d-flex justify-content-between align-items-center p-3 mb-5">
                <span class="me-2"><strong>Hello, {{ user.username }}</strong></span>
                <form method="post" action="{% url 'logout' %}">
                    {% csrf_token %}
                    <a href="{% url 'profile' %}" class="btn btn-outline-dark btn-sm">Profile</a>
                    <button type="submit" class="btn btn-outline-info btn-sm">Logout</button>
                </form>
            </div>
            {% comment %} <a href="{% url 'logout' %}" class="btn btn-sm btn-danger">Logout</a> {% endcomment %}
        {% endif %}
    </div>

    <div class="container">
        {% include 'includes/messages.html' %}
        {% block content %}
        {% endblock %}
    </div>

    <script src="{% static 'js/bootstrap.bundle.js' %}"></script>
</body>
</html>
