{% extends 'base.html' %}
{% block title %} Confirm Delete Task {% endblock %}


{% block content %}
<h3>Are You sure You want to delete this Task? </h3>
<strong>{{objects.title}}</strong>

<form method="post">
    {% csrf_token %}
    <div class="d-flex align-items-center">
        <button type="submit" class="btn-sm btn-danger">Yes, Delete</button>
        <a href="{% url 'tasks:list_task'  %}" class="btn-sm btn-secondary">Cancel</a>
    </div>
</form>
{% endblock %}
